# Grok CLI Configuration Example
# Copy this to .grok/config.toml (project root) or ~/.grok/config.toml (user)
# and customize as needed.
#
# Priority order (highest → lowest):
#   Environment variables → project .grok/config.toml → user ~/.grok/config.toml → built-in defaults
#
# Priority order (highest → lowest):
#   Environment variables → project .grok/config.toml → system config → built-in defaults

# ── API ──────────────────────────────────────────────────────────────────────
# NOTE: Do NOT store your API key in this file!
# Instead, create a .env file in the project root or ~/.grok/ with:
#   GROK_API_KEY=xai-your-api-key-here
# Or set the environment variable GROK_API_KEY or X_API_KEY
api_key = "xai-your-api-key-here"
default_model = "grok-4.3"
default_temperature = 0.7
# Output token budget (not the context window size).
# grok-4.3 supports up to 32 768 output tokens; 16 384 is a safe default.
default_max_tokens = 16384

# Request timeout in seconds.
# LLM responses can be slow, especially with large max_tokens or many tool
# calls.  On Starlink the satellite round-trip alone adds ~600 ms, and a
# complex multi-step session can take several minutes.
# ⚠️  30 seconds (old default) is almost always too short — use 300 or higher.
# Environment override: GROK_TIMEOUT
timeout_secs = 300
max_retries = 5

[general]
preview_features = false
preferred_editor = ""
vim_mode = false
disable_auto_update = false
disable_update_nag = false
enable_prompt_completion = false
retry_fetch_errors = false
debug_keystroke_logging = false

[general.session_retention]
enabled = false
max_age = 168
max_count = 50
min_retention = 24

[output]
format = "text"

# Timeout in seconds to wait for a user's response to a permission prompt.
# If the user doesn't respond within this window, the tool call fails.
# Increase this if you need more time to read the tool description before deciding.
# Default: 300
permission_timeout_secs = 300

# Maximum number of conversation turns kept in session context.
# Older messages beyond this limit are trimmed before each API call to
# prevent unbounded context growth across long sessions.
# Increase for longer multi-turn conversations; decrease to save tokens.
# Default: 40
max_history_messages = 40

# Soft token budget for the full outgoing request (history + system prompt +
# tool definitions) — used for grok-3 and older models.
# The Grok-3 / grok-beta context window is 256 000 tokens; this default
# leaves ~36 k headroom for the model response and tool schemas.
# Default: 220000
max_context_tokens = 220000

# Soft token budget for grok-4.x models (grok-4.3 and later).
# grok-4.3 exposes a 1 048 576-token context window.  This budget leaves
# ~50 k headroom for model response + tool definitions.
# When the active model starts with "grok-4" this value takes effect
# instead of max_context_tokens.
# Default: 950000
grok4_max_context_tokens = 950000

# Maximum characters per tool-result message.  Large file reads are the most
# common source of context-window overflow; this truncates them early while
# preserving the conversation structure.
# Set to 0 to disable per-message truncation.
# Default: 30000  (~7 500 tokens)
max_tool_result_chars = 30000

# Enable automatic context summarization when approaching the token limit.
# When triggered the oldest messages are summarized by the AI and archived to
# disk; a compact notice replaces them so the model knows history is available.
# Set to false to revert to the old drop-only behaviour.
# Default: true
auto_compress = true

# Fraction of max_context_tokens at which compression fires (0.0-1.0).
# Default: 0.75  (fires at 75% of the token budget)
compression_threshold = 0.75

# Fraction of current non-system messages compressed per event (0.0-1.0).
# Minimum of 4 messages is always enforced.
# Default: 0.40
compression_chunk_ratio = 0.40

# Reasoning / thinking mode for grok-4.3 and grok-3-mini.
# - off  : standard response, no chain-of-thought (default and fastest)
# - low  : light reasoning; slightly slower, more thorough
# - high : deep reasoning; most thorough, slowest, highest token cost
# Sending this to models that do not support it returns an API error.
# Change per-session with the /think slash command or the --thinking CLI flag.
# Default: off
thinking_mode = "off"

# ── Network (Starlink-optimised) ─────────────────────────────────────────────
[network]
# Enable Starlink-specific retry heuristics (satellite drop detection).
starlink_optimizations = true

# Initial delay before the first retry, in seconds.  Doubles each attempt.
base_retry_delay = 5

# Upper bound on retry delay, in seconds.
max_retry_delay = 60

# Monitor network health and adapt retry behaviour automatically.
health_monitoring = true

# TCP connection timeout in seconds (just for establishing the socket).
# 10 s is usually fine even on Starlink.
# Environment override: GROK_CONNECT_TIMEOUT
connect_timeout = 10

# How long to wait for data after the connection is open, in seconds.
# Set this to match (or slightly exceed) timeout_secs above.
# ⚠️  30 seconds is too short for LLM streaming responses.
# Environment override: GROK_READ_TIMEOUT
read_timeout = 300

# UI Configuration
[security]
disable_yolo_mode = false
enable_permanent_tool_approval = false
block_git_extensions = false
shell_approval_mode = ""

[security.folder_trust]
enabled = false

[security.environment_variable_redaction]
allowed = []
blocked = []

[bayesian]
# Master on/off switch. When false the router is fully bypassed.
enabled = true

# Show the real-time ASCII belief-graph after each message.
show_belief_graph = false

# ── Sensitivity thresholds ────────────────────────────────────────────────────
# All values are probabilities in [0.0, 1.0].
# Lower  → more cautious / fires more readily
# Higher → more permissive / fires less readily

# Router asks for clarification when P(need_clarification) exceeds this.
clarification_threshold = 0.75

# System uncertainty notes injected when P(need_clarification|low_confidence)
# exceeds this.
uncertainty_threshold = 0.85

# "Request is vague" note injected when P(is_vague) exceeds this.
vagueness_threshold = 0.80

# ── Learning parameters ───────────────────────────────────────────────────────

# Strength of keyword → intent likelihood spikes.
# Higher = more decisive routing on a keyword match.
intent_likelihood_weight = 1.2

# Fractional boost per successful tool call (0.1 = 10%).
profile_learning_rate = 0.05

# ── Default priors ────────────────────────────────────────────────────────────
# Starting belief weights used when no saved profile exists on disk.
# Values need not sum to 1 — they are normalised on load.
[bayesian.priors]
intent_edit         = 0.2
intent_shell        = 0.2
intent_search       = 0.2
intent_question     = 0.3
need_clarification  = 0.1
low_confidence      = 0.2
is_vague            = 0.1
belief_decay_rate = 0.97     # stronger decay (more stable)
prior_pull_rate   = 0.15     # stronger pull toward priors

[experimental.codebase_investigator_settings]
enabled = true
max_num_turns = 10
max_time_minutes = 15
thinking_budget = 1000
model = "auto"

[experimental.extensions]
enabled = true
extension_dir = "~/.grok/extensions"
enabled_extensions = []
allow_config_extensions = true

[acp]
enabled = true
bind_host = "127.0.0.1"
protocol_version = "2024-11-05"
dev_mode = false
max_tool_loop_iterations = 25
# Disable the session/request_permission gate by default.
# Zed and most ACP clients do not yet implement the permission-dialog protocol,
# so leaving this true causes every tool call to be silently blocked.
# Set to true only when using a client that supports session/request_permission.
require_permission = false
permission_timeout_secs = 300
max_history_messages = 80

[mcp.servers.github]
type = "stdio"
# Update this path to point to your built MCP server binary
command = "./target/debug/github_mcp.exe"
args = []

[mcp.servers.github.env]

[logging]
level = "info"
file_logging = false
max_file_size_mb = 10
rotation_count = 5

[telemetry]
enabled = false

[rate_limits]
max_tokens_per_minute = 100000
max_requests_per_minute = 60

# MCP (Model Context Protocol) Servers Configuration
# Configure external MCP servers for extended functionality
# Uncomment and customize the examples below to enable MCP servers

# Example: GitHub MCP Server
# [mcp.servers.github]
# type = "stdio"
# command = "path/to/github_mcp.exe"
# args = []
# env = {}  # Required field - environment variables for the MCP server

# Example: Custom MCP Server with environment variables
# [mcp.servers.custom]
# type = "stdio"
# command = "/usr/local/bin/custom-mcp-server"
# args = ["--verbose", "--config", "/path/to/config"]
# env = { LOG_LEVEL = "debug", API_KEY = "your-key-here" }

# Note: The 'env' field is REQUIRED for each MCP server, even if empty ({})
# This prevents TOML parsing errors during configuration loading
