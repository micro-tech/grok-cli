# Grok CLI Configuration Example
# Copy this to ~/.grok/config.toml (project) or %APPDATA%\grok-cli\config.toml (system)
# and customize as needed.
#
# Priority order (highest → lowest):
#   Environment variables → project .grok/config.toml → system config → built-in defaults

# ── API ──────────────────────────────────────────────────────────────────────
# NOTE: Do NOT store your API key in this file!
# Instead, create a .env file in ~/.config/grok-cli/ with:
#   GROK_API_KEY=xai-your-api-key-here
# Or set the environment variable GROK_API_KEY or X_API_KEY
api_key = "xai-your-api-key-here"
default_model = "grok-code-fast-1"
default_temperature = 0.7
default_max_tokens = 256000
timeout_secs = 300
max_retries = 5

[general]
preview_features = false
preferred_editor = ""
vim_mode = false
disable_auto_update = false
disable_update_nag = false
enable_prompt_completion = false
retry_fetch_errors = false
debug_keystroke_logging = false

[general.session_retention]
enabled = false
max_age = 168
max_count = 50
min_retention = 24

[output]
format = "text"

[ui]
colors = true
progress_bars = true
verbose_errors = false
terminal_width = 0
unicode = true
theme = "default"
hide_window_title = false
show_status_in_title = false
hide_tips = false
hide_banner = false
hide_context_summary = false
hide_footer = false
show_memory_usage = false
show_line_numbers = true
show_citations = false
show_model_info_in_chat = false
use_full_width = true
use_alternate_buffer = false
incremental_rendering = false
custom_witty_phrases = []

[ui.custom_themes]

[ui.footer]
hide_cwd = false
hide_sandbox_status = false
hide_model_info = false
hide_context_percentage = true

[ui.accessibility]
disable_loading_phrases = false
screen_reader = false

[ui.interactive]
prompt_style = "rich"
show_context_usage = true
auto_save_sessions = false
check_directory = true
startup_animation = true
update_check_hours = 24

[ui.interactive.key_bindings]

[model]
name = "grok-3"
max_session_turns = 200
summarize_tool_output = false
compression_threshold = 0.0
skip_next_speaker_check = true

[context]
file_name = ""
import_format = ""
discovery_max_dirs = 0
include_directories = []
load_memory_from_include_directories = false

[context.file_filtering]
respect_git_ignore = true
respect_grok_ignore = true
enable_recursive_file_search = true
disable_fuzzy_search = false

[tools]
auto_accept = false
core = []
allowed = []
exclude = []
discovery_command = ""
call_command = ""
use_ripgrep = true
enable_tool_output_truncation = true
truncate_tool_output_threshold = 0
truncate_tool_output_lines = 0
enable_message_bus_integration = true
enable_hooks = true

[tools.shell]
enable_interactive_shell = true
pager = ""
show_color = false
inactivity_timeout = 0
# Maximum seconds a shell command (e.g. cargo build, npm install) may run
# before it is killed and an error is returned to the model.
# Increase this for slow builds or large dependency installs.
# The GROK_SHELL_TIMEOUT_SECS environment variable overrides this value
# at runtime without editing the file (useful for one-off long commands).
# Default: 300 (5 minutes)
command_timeout_secs = 300

[security]
disable_yolo_mode = false
enable_permanent_tool_approval = false
block_git_extensions = false
shell_approval_mode = ""

[security.folder_trust]
enabled = false

[security.environment_variable_redaction]
allowed = []
blocked = []
enabled = false

[security.external_access]
enabled = false
require_approval = true
logging = true
allowed_paths = ["./", "./logs", "./config", "./zed"]
excluded_patterns = [
    "**/.env",
    "**/.env.*",
    "**/.git/**",
    "**/.ssh/**",
    "**/*.key",
    "**/*.pem",
    "**/*.p12",
    "**/*.pfx",
    "**/id_rsa*",
    "**/password*",
    "**/secret*",
    "**/.aws/**",
    "**/.azure/**",
]

[experimental]
enable_agents = false
extension_management = false
extension_reloading = false
jit_context = false


[bayesian]
# Master on/off switch. When false the router is fully bypassed.
enabled = true

# Show the real-time ASCII belief-graph after each message.
show_belief_graph = false

# ── Sensitivity thresholds ────────────────────────────────────────────────────
# All values are probabilities in [0.0, 1.0].
# Lower  → more cautious / fires more readily
# Higher → more permissive / fires less readily

# Router asks for clarification when P(need_clarification) exceeds this.
clarification_threshold = 0.65

# System uncertainty notes injected when P(need_clarification|low_confidence)
# exceeds this.
uncertainty_threshold = 0.8

# "Request is vague" note injected when P(is_vague) exceeds this.
vagueness_threshold = 0.75

# ── Learning parameters ───────────────────────────────────────────────────────

# Strength of keyword → intent likelihood spikes.
# Higher = more decisive routing on a keyword match.
intent_likelihood_weight = 2.5

# Fractional boost per successful tool call (0.1 = 10%).
profile_learning_rate = 0.1

# ── Default priors ────────────────────────────────────────────────────────────
# Starting belief weights used when no saved profile exists on disk.
# Values need not sum to 1 — they are normalised on load.
[bayesian.priors]
intent_edit         = 0.2
intent_shell        = 0.2
intent_search       = 0.2
intent_question     = 0.3
need_clarification  = 0.1
low_confidence      = 0.2
is_vague            = 0.1

[experimental.codebase_investigator_settings]
enabled = true
max_num_turns = 10
max_time_minutes = 15
thinking_budget = 1000
model = "auto"

[experimental.extensions]
enabled = true
extension_dir = "~/.grok/extensions"
enabled_extensions = []
allow_config_extensions = true

[acp]
enabled = true
bind_host = "127.0.0.1"
protocol_version = "2024-11-05"
dev_mode = false
max_tool_loop_iterations = 100
# Disable the session/request_permission gate by default.
# Zed and most ACP clients do not yet implement the permission-dialog protocol,
# so leaving this true causes every tool call to be silently blocked.
# Set to true only when using a client that supports session/request_permission.
require_permission = false
permission_timeout_secs = 300
max_history_messages = 80

[mcp.servers.github]
type = "stdio"
command = 'H:\GitHub\grok-cli\target\debug\github_mcp.exe'
args = []

[mcp.servers.github.env]

[network]
starlink_optimizations = true
base_retry_delay = 5
max_retry_delay = 60
health_monitoring = true
connect_timeout = 10
read_timeout = 300

[logging]
level = "info"
file_logging = false
max_file_size_mb = 10
rotation_count = 5

[telemetry]
enabled = false

[rate_limits]
max_tokens_per_minute = 100000
max_requests_per_minute = 60

# MCP (Model Context Protocol) Servers Configuration
# Configure external MCP servers for extended functionality
# Uncomment and customize the examples below to enable MCP servers

# Example: GitHub MCP Server
# [mcp.servers.github]
# type = "stdio"
# command = "path/to/github_mcp.exe"
# args = []
# env = {}  # Required field - environment variables for the MCP server

# Example: Custom MCP Server with environment variables
# [mcp.servers.custom]
# type = "stdio"
# command = "/usr/local/bin/custom-mcp-server"
# args = ["--verbose", "--config", "/path/to/config"]
# env = { LOG_LEVEL = "debug", API_KEY = "your-key-here" }

# Note: The 'env' field is REQUIRED for each MCP server, even if empty ({})
# This prevents TOML parsing errors during configuration loading
